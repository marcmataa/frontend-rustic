<div class="login-wrapper">
  <div class="login-card">

    <div class="login-header">
      <span class="brand-label">CAN RÚSTIC · GASTRO BAR</span>
      <h2>Bienvenido de nuevo</h2>
      <p>Inicia sesión para gestionar tus reservas.</p>
    </div>

    @if (sessionExpired()) {
      <div class="alert-expired">
        ⚠️ Tu sesión ha caducado. Por favor, inicia sesión de nuevo.
      </div>
    }

    <div class="field">
      <label for="email">Correo Electrónico</label>
      <input
        id="email"
        type="email"
        [ngModel]="email()"
        (ngModelChange)="email.set($event)"
        placeholder="ejemplo@correo.com"
        autocomplete="email"
      />
    </div>

    <div class="field">
      <label for="password">Contraseña</label>
      <input
        id="password"
        type="password"
        [ngModel]="password()"
        (ngModelChange)="password.set($event)"
        placeholder="••••••••"
        autocomplete="current-password"
      />
    </div>

    <button type="button" class="submit-btn" (click)="onLogin()">
      <span>Iniciar Sesión</span>
      <span class="submit-arrow">→</span>
    </button>

    <div class="login-footer">
      <span>¿Aún no tienes cuenta?</span>
      <a routerLink="/register">Regístrate →</a>
    </div>

  </div>
</div>
